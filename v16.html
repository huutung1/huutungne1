    <main class="product-container">
      <h2>ASUS Zenbook S14 UX5406AA-SU415WS</h2>
      <img
        src="./imageddsp/v16.jpg"
        alt="ASUS Gaming V16 V3607VH-RP025W"
        class="product-img"
      />
      <ul class="specs">
        <li>CPU: Intel® Core™ 7</li>
        <li>GPU: NVIDIA® GeForce RTX™ 5050X</li>
        <li>RAM: 16GB DDR5</li>
        <li>Ổ cứng: 512GB M.2 NVMe™ PCIe® 4.0 SSD</li>
      </ul>
      <p class="price">31.990.000₫</p>
      <button
        class="them"
        onclick="addToCart('ASUS Gaming V16 V3607VH-RP025W', 31990000)"
      >
        Thêm Vào Giỏ Hàng
      </button>
    </main>
  </body>
  <script>
    function addToCart(name, price) {
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      let item = cart.find((p) => p.name === name);
      if (item) {
        item.quantity++;
      } else {
        cart.push({ name, price, quantity: 1 });
      }
      localStorage.setItem("cart", JSON.stringify(cart));
      alert("Đã thêm vào giỏ hàng!");
    }
  </script>
