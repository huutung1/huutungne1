</head>
<body>
  <!-- Header + Menu -->
  <header id="menu">
    <h1 class="logo">TECHRED</h1>
    <nav>
      <ul>
        <li><a href="trangchu.html">Trang Chủ</a></li>
          <li><a href="dndk.html">Đăng Nhập/Đăng Kí</a></li>

          <li><a href="tonghoplab.html">Bài Tập</a></li>
      </ul>
    </nav>
  </header>

  <!-- Nội dung đăng nhập / đăng ký -->
  <main class="container">
    <div class="form-box">
      <h2>Đăng nhập</h2>
      <form action="login.php" method="post">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" name="email" required>
        
        <label for="login-password">Mật khẩu</label>
        <input type="password" id="login-password" name="password" required>
        
        <button type="submit">Đăng nhập</button>
      </form>
    </div>

    <div class="form-box">
      <h2>Đăng ký</h2>
      <form action="register.php" method="post">
        <label for="reg-name">Họ và tên</label>
        <input type="text" id="reg-name" name="name" required>
        
        <label for="reg-email">Email</label>
        <input type="email" id="reg-email" name="email" required>
        
        <label for="reg-password">Mật khẩu</label>
        <input type="password" id="reg-password" name="password" required>
        
        <label for="reg-confirm">Xác nhận mật khẩu</label>
        <input type="password" id="reg-confirm" name="confirm_password" required>
        
        <button type="submit">Đăng ký</button>
      </form>
    </div>
  </main>
</body>
</html>
